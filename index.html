<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Color Palette - 색상 조합 추천</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #22223a;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --border: #2a2a40;
}

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 20px 20px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 2.2em;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #a78bfa, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header p { color: var(--text-muted); font-size: 1.05em; }

/* Tabs */
.tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 20px;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 10px 24px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  border-radius: 25px;
  cursor: pointer;
  font-size: 0.95em;
  transition: all 0.3s;
}
.tab-btn:hover { border-color: var(--accent); }
.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Tab Content */
.tab-content { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
.tab-content.active { display: block; }

/* Section Title */
.section-title {
  font-size: 1.3em;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ===== 추천 팔레트 ===== */
.palette-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.palette-card {
  background: var(--card);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}
.palette-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(124,58,237,0.15);
}
.palette-colors {
  display: flex;
  height: 100px;
}
.palette-colors div {
  flex: 1;
  transition: flex 0.3s;
  position: relative;
}
.palette-colors div:hover { flex: 2; }
.palette-colors div::after {
  content: attr(data-hex);
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7em;
  opacity: 0;
  transition: opacity 0.3s;
  background: rgba(0,0,0,0.6);
  padding: 2px 8px;
  border-radius: 10px;
  color: white;
  white-space: nowrap;
}
.palette-colors div:hover::after { opacity: 1; }
.palette-info {
  padding: 16px;
}
.palette-info h3 { font-size: 1em; margin-bottom: 6px; }
.palette-info p { font-size: 0.85em; color: var(--text-muted); }
.palette-tags {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.palette-tag {
  font-size: 0.75em;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(124,58,237,0.15);
  color: var(--accent-light);
}

/* Filter */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.3s;
}
.filter-btn:hover { border-color: var(--accent-light); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ===== 색상 선택기 ===== */
.picker-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}
@media (max-width: 768px) {
  .picker-container { grid-template-columns: 1fr; }
}
.picker-left, .picker-right {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid var(--border);
}
.color-input-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.color-input-row input[type="color"] {
  width: 60px;
  height: 50px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: transparent;
}
.color-input-row input[type="text"] {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 1.1em;
  font-family: monospace;
}
.harmony-label {
  font-size: 0.9em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.harmony-colors {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.harmony-swatch {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
  border: 2px solid transparent;
}
.harmony-swatch:hover {
  transform: scale(1.15);
  border-color: white;
}
.harmony-swatch .hex-label {
  position: absolute;
  bottom: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7em;
  color: var(--text-muted);
  white-space: nowrap;
}
.harmony-section { margin-bottom: 24px; }
.harmony-type-btns {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.harmony-type-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  border-radius: 15px;
  cursor: pointer;
  font-size: 0.8em;
  transition: all 0.3s;
}
.harmony-type-btn:hover { border-color: var(--accent-light); color: var(--text); }
.harmony-type-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Preview */
.preview-box {
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.preview-header {
  padding: 16px 20px;
  font-weight: 600;
}
.preview-body {
  padding: 20px;
}
.preview-body p {
  margin-bottom: 10px;
  line-height: 1.6;
}
.preview-btn {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 600;
}

/* ===== 그라데이션 ===== */
.gradient-maker {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid var(--border);
}
.gradient-preview {
  height: 200px;
  border-radius: 12px;
  margin-bottom: 20px;
  position: relative;
}
.gradient-css-code {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  font-family: monospace;
  font-size: 0.9em;
  color: var(--accent-light);
  word-break: break-all;
  margin-bottom: 16px;
  position: relative;
}
.gradient-controls {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 16px;
}
.gradient-controls label { color: var(--text-muted); font-size: 0.9em; }
.gradient-controls input[type="color"] {
  width: 50px;
  height: 40px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: transparent;
}
.gradient-controls select {
  padding: 8px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
}
.gradient-controls input[type="range"] {
  width: 120px;
  accent-color: var(--accent);
}
.gradient-presets {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-top: 20px;
}
.gradient-preset {
  height: 80px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
}
.gradient-preset:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border-color: rgba(255,255,255,0.2);
}

/* ===== 트렌드 ===== */
.trend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.trend-card {
  background: var(--card);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: transform 0.3s;
}
.trend-card:hover { transform: translateY(-4px); }
.trend-colors {
  display: flex;
  height: 120px;
}
.trend-colors div { flex: 1; }
.trend-info { padding: 16px; }
.trend-info h3 { margin-bottom: 4px; }
.trend-info p { font-size: 0.85em; color: var(--text-muted); margin-bottom: 10px; }
.trend-hex-list {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.trend-hex {
  font-size: 0.75em;
  padding: 3px 8px;
  background: var(--bg);
  border-radius: 8px;
  font-family: monospace;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.2s;
}
.trend-hex:hover { background: var(--accent); color: white; }

/* ===== 테마별 ===== */
.theme-category-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.theme-cat-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.3s;
}
.theme-cat-btn:hover { border-color: var(--accent-light); color: var(--text); }
.theme-cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Search Bar */
.search-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 24px 20px 16px;
}
.search-bar {
  display: flex;
  align-items: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 20px;
  gap: 12px;
  transition: border-color 0.3s, box-shadow 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.search-bar:focus-within {
  box-shadow: 0 2px 16px rgba(124,58,237,0.2);
}
.search-bar:focus-within { border-color: var(--accent); }
.search-bar svg { flex-shrink: 0; color: var(--text-muted); width: 20px; height: 20px; }
.search-bar input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1.05em;
  outline: none;
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-bar .clear-btn {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 1.2em;
  cursor: pointer;
  display: none;
  padding: 0 4px;
  line-height: 1;
}
.search-bar .clear-btn.visible { display: block; }
.search-bar .clear-btn:hover { color: var(--text); }
.search-results-info {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85em;
  padding: 8px 0 0;
}
.search-no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.search-no-results .no-emoji { font-size: 2.5em; margin-bottom: 12px; }
.search-no-results p { font-size: 0.95em; }

/* Random Tab */
.random-refresh-btn {
  padding: 12px 32px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border: none;
  color: white;
  border-radius: 25px;
  font-size: 1em;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(124,58,237,0.3);
}
.random-refresh-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(124,58,237,0.4);
}
.random-refresh-btn:active { transform: translateY(0); }

/* Copy Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  color: white;
  padding: 12px 28px;
  border-radius: 25px;
  font-size: 0.95em;
  z-index: 1000;
  transition: transform 0.4s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Color Modal */
.color-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 900;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.color-modal-overlay.open { display: flex; }
.color-modal {
  background: var(--card);
  border-radius: 20px;
  border: 1px solid var(--border);
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.color-modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none; border: none;
  color: var(--text-muted);
  font-size: 1.5em;
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.color-modal-close:hover { color: var(--text); }
.modal-selected-color {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.modal-color-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.modal-color-hex {
  font-family: monospace;
  font-size: 1.4em;
  font-weight: 600;
  cursor: pointer;
}
.modal-color-hex:hover { color: var(--accent-light); }
.modal-section-title {
  font-size: 0.85em;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.modal-harmony-group { margin-bottom: 20px; }
.modal-harmony-label {
  font-size: 0.9em;
  color: var(--accent-light);
  margin-bottom: 8px;
  font-weight: 500;
}
.modal-harmony-swatches {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.modal-swatch {
  width: 48px; height: 48px;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
  position: relative;
}
.modal-swatch:hover {
  transform: scale(1.15);
  border-color: rgba(255,255,255,0.4);
}
.modal-swatch-hex {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.65em;
  color: var(--text-muted);
  white-space: nowrap;
  font-family: monospace;
}
.modal-similar-title {
  font-size: 0.85em;
  color: var(--text-muted);
  margin: 24px 0 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.modal-similar-card {
  background: var(--bg);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.modal-similar-colors {
  display: flex;
  height: 40px;
}
.modal-similar-colors div { flex: 1; }
.modal-similar-info {
  padding: 8px 12px;
  font-size: 0.85em;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-similar-info span { color: var(--text-muted); font-size: 0.8em; }

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.6em; }
  .palette-grid { grid-template-columns: 1fr; }
  .gradient-presets { grid-template-columns: repeat(2, 1fr); }
  .color-modal { padding: 20px; max-height: 90vh; }
  .modal-color-circle { width: 48px; height: 48px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🎨 Color Palette</h1>
  <p>아름다운 색상 조합을 찾아보세요</p>
</div>

<div class="search-container">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="색상 검색 (예: 파스텔, ocean, pink, 봄...)">
    <button class="clear-btn" id="searchClear" onclick="clearSearch()">&times;</button>
  </div>
  <div class="search-results-info" id="searchInfo"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="palettes">🎯 추천 팔레트</button>
  <button class="tab-btn" data-tab="picker">🔍 색상 조합기</button>
  <button class="tab-btn" data-tab="gradient">🌈 그라데이션</button>
  <button class="tab-btn" data-tab="theme">🏷️ 테마별</button>
  <button class="tab-btn" data-tab="trend">🔥 트렌드</button>
  <button class="tab-btn" data-tab="random">🎲 랜덤 추천</button>
</div>

<!-- ===== 추천 팔레트 ===== -->
<div class="tab-content active" id="tab-palettes">
  <div class="section-title">🎯 추천 색상 팔레트</div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="palette-grid" id="paletteGrid"></div>
</div>

<!-- ===== 색상 조합기 ===== -->
<div class="tab-content" id="tab-picker">
  <div class="section-title">🔍 색상 조합기</div>
  <div class="picker-container">
    <div class="picker-left">
      <div class="color-input-row">
        <input type="color" id="baseColor" value="#7c3aed">
        <input type="text" id="baseHex" value="#7c3aed" maxlength="7">
      </div>
      <div class="harmony-type-btns" id="harmonyBtns">
        <button class="harmony-type-btn active" data-type="complementary">보색</button>
        <button class="harmony-type-btn" data-type="analogous">유사색</button>
        <button class="harmony-type-btn" data-type="triadic">3색 조화</button>
        <button class="harmony-type-btn" data-type="split">분할 보색</button>
        <button class="harmony-type-btn" data-type="tetradic">4색 조화</button>
        <button class="harmony-type-btn" data-type="monochromatic">단색 조화</button>
      </div>
      <div class="harmony-section">
        <div class="harmony-label" id="harmonyLabel">보색 조합</div>
        <div class="harmony-colors" id="harmonyColors"></div>
      </div>
    </div>
    <div class="picker-right">
      <h3 style="margin-bottom: 16px;">미리보기</h3>
      <div class="preview-box" id="previewBox">
        <div class="preview-header" id="previewHeader">웹사이트 헤더</div>
        <div class="preview-body" id="previewBody">
          <p>이 텍스트는 본문 영역입니다. 선택한 색상 조합이 실제로 어떻게 보이는지 확인해보세요.</p>
          <button class="preview-btn" id="previewBtn">버튼 예시</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 그라데이션 ===== -->
<div class="tab-content" id="tab-gradient">
  <div class="section-title">🌈 그라데이션 메이커</div>
  <div class="gradient-maker">
    <div class="gradient-preview" id="gradientPreview"></div>
    <div class="gradient-controls">
      <label>시작색</label>
      <input type="color" id="gradColor1" value="#7c3aed">
      <label>종료색</label>
      <input type="color" id="gradColor2" value="#ec4899">
      <label>방향</label>
      <select id="gradDirection">
        <option value="to right">→ 오른쪽</option>
        <option value="to left">← 왼쪽</option>
        <option value="to bottom">↓ 아래</option>
        <option value="to top">↑ 위</option>
        <option value="135deg" selected>↘ 대각선</option>
        <option value="to right top">↗ 대각선</option>
        <option value="circle">◉ 원형</option>
      </select>
      <label>각도</label>
      <input type="range" id="gradAngle" min="0" max="360" value="135">
      <span id="gradAngleVal">135°</span>
    </div>
    <div class="gradient-css-code" id="gradientCode" onclick="copyText(this.textContent)">

// ===== COLOR PICKER / HARMONY =====
const baseColorInput = document.getElementById('baseColor');
const baseHexInput = document.getElementById('baseHex');
let harmonyType = 'complementary';

function hexToHSL(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  let max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h,s,l = (max+min)/2;
  if (max===min) { h=s=0; }
  else {
    let d = max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h,s,l) {
  h = ((h%360)+360)%360;
  s /= 100; l /= 100;
  let c = (1-Math.abs(2*l-1))*s;
  let x = c*(1-Math.abs((h/60)%2-1));
  let m = l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0}
  else if(h<120){r=x;g=c;b=0}
  else if(h<180){r=0;g=c;b=x}
  else if(h<240){r=0;g=x;b=c}
  else if(h<300){r=x;g=0;b=c}
  else{r=c;g=0;b=x}
  r=Math.round((r+m)*255);g=Math.round((g+m)*255);b=Math.round((b+m)*255);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function getHarmonyColors(hex, type) {
  const [h,s,l] = hexToHSL(hex);
  switch(type) {
    case 'complementary': return [hex, hslToHex(h+180,s,l)];
    case 'analogous': return [hslToHex(h-30,s,l), hex, hslToHex(h+30,s,l)];
    case 'triadic': return [hex, hslToHex(h+120,s,l), hslToHex(h+240,s,l)];
    case 'split': return [hex, hslToHex(h+150,s,l), hslToHex(h+210,s,l)];
    case 'tetradic': return [hex, hslToHex(h+90,s,l), hslToHex(h+180,s,l), hslToHex(h+270,s,l)];
    case 'monochromatic': return [hslToHex(h,s,Math.max(l-30,10)), hslToHex(h,s,Math.max(l-15,10)), hex, hslToHex(h,s,Math.min(l+15,90)), hslToHex(h,s,Math.min(l+30,90))];
  }
}

const harmonyNames = {
  complementary: '보색 조합', analogous: '유사색 조합', triadic: '3색 조화',
  split: '분할 보색', tetradic: '4색 조화', monochromatic: '단색 조화'
};

function updateHarmony() {
  const hex = baseColorInput.value;
  const colors = getHarmonyColors(hex, harmonyType);
  document.getElementById('harmonyLabel').textContent = harmonyNames[harmonyType];
  document.getElementById('harmonyColors').innerHTML = colors.map(c =>
    `<div class="harmony-swatch" style="background:${c}" onclick="copyText('${c}')"><span class="hex-label">${c}</span></div>`
  ).join('');
  updatePreview(colors);
}

function updatePreview(colors) {
  const header = document.getElementById('previewHeader');
  const body = document.getElementById('previewBody');
  const btn = document.getElementById('previewBtn');
  const box = document.getElementById('previewBox');
  const base = colors[0];
  const accent = colors[1] || colors[0];
  const [,, l] = hexToHSL(base);
  header.style.background = base;
  header.style.color = l > 50 ? '#222' : '#fff';
  body.style.background = l > 50 ? '#fff' : '#f8f8f8';
  body.style.color = '#333';
  btn.style.background = accent;
  const [,,al] = hexToHSL(accent);
  btn.style.color = al > 50 ? '#222' : '#fff';
  box.style.borderColor = base;
}

baseColorInput.addEventListener('input', () => {
  baseHexInput.value = baseColorInput.value;
  updateHarmony();
});
baseHexInput.addEventListener('input', () => {
  if (/^#[0-9a-fA-F]{6}$/.test(baseHexInput.value)) {
    baseColorInput.value = baseHexInput.value;
    updateHarmony();
  }
});

const gc1 = document.getElementById('gradColor1');
const gc2 = document.getElementById('gradColor2');
const gDir = document.getElementById('gradDirection');
const gAngle = document.getElementById('gradAngle');
const gAngleVal = document.getElementById('gradAngleVal');

function updateGradient() {
  const dir = gDir.value;
  const c1 = gc1.value, c2 = gc2.value;
  let css;
  if (dir === 'circle') {
    css = `background: radial-gradient(circle, ${c1}, ${c2})`;
  } else if (['to right','to left','to bottom','to top','to right top'].includes(dir)) {
    css = `background: linear-gradient(${dir}, ${c1}, ${c2})`;
  } else {
    css = `background: linear-gradient(${gAngle.value}deg, ${c1}, ${c2})`;
  }
  document.getElementById('gradientPreview').style.cssText = css + '; height:200px; border-radius:12px;';
  document.getElementById('gradientCode').textContent = css + ';';
}

gc1.addEventListener('input', updateGradient);
gc2.addEventListener('input', updateGradient);
gDir.addEventListener('change', updateGradient);
gAngle.addEventListener('input', () => {
  gAngleVal.textContent = gAngle.value + '°';
  gDir.value = gAngle.value + 'deg';
  updateGradient();
});

presetsGrid.innerHTML = gradientPresets.map((p, i) =>
  `<div class="gradient-preset" style="background:linear-gradient(135deg,${p.colors[0]},${p.colors[1]})"
    title="${p.name}" onclick="applyGradientPreset(${i})"></div>`
).join('');

function applyGradientPreset(i) {
  const p = gradientPresets[i];
  gc1.value = p.colors[0];
  gc2.value = p.colors[1];
  gDir.value = '135deg';
  gAngle.value = 135;
  gAngleVal.textContent = '135°';
  updateGradient();
  showToast('🌈 ' + p.name + ' 적용!');
}

const themeCategories = [
  { key: '전체', label: '🏷️ 전체' },
  { key: 'season', label: '🌸 계절' },
  { key: 'country', label: '🌍 국가' },
  { key: 'mood', label: '💫 상황/무드' },
  { key: 'food', label: '🍽️ 음식' },
  { key: 'nature', label: '🏔️ 자연' },
];
let currentThemeFilter = '전체';

function renderThemeCategoryBar() {
  const bar = document.getElementById('themeCategoryBar');
  bar.innerHTML = themeCategories.map(c =>
    `<button class="theme-cat-btn ${c.key === currentThemeFilter ? 'active' : ''}" onclick="filterTheme('${c.key}')">${c.label}</button>`
  ).join('');
}

function filterTheme(key) {
  currentThemeFilter = key;
  renderThemeCategoryBar();
  renderThemeGrid();
}

function renderThemeGrid() {
  const grid = document.getElementById('themeGrid');
  const filtered = currentThemeFilter === '전체' ? themePalettes : themePalettes.filter(p => p.theme === currentThemeFilter);
  grid.innerHTML = filtered.map(p => `
    <div class="palette-card">
      <div class="palette-colors">
        ${p.colors.map(c => `<div style="background:${c}" data-hex="${c}" onclick="openColorModal('${c}')"></div>`).join('')}
      </div>
      <div class="palette-info">
        <h3>${p.name} <span style="font-size:0.75em;color:var(--text-muted);font-weight:normal;">${p.sub}</span></h3>
        <p>${p.desc}</p>
        <div class="palette-tags">
          ${p.tags.map(t => `<span class="palette-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

renderThemeCategoryBar();
renderThemeGrid();

    <div class="trend-info">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <div class="trend-hex-list">
        ${p.colors.map(c => `<span class="trend-hex" onclick="copyText('${c}')">${c}</span>`).join('')}

`).join('');

  '한국': 'korea', '일본': 'japan', '프랑스': 'france', '이탈리아': 'italy', '그리스': 'greece',
  '인도': 'india', '멕시코': 'mexico', '모로코': 'morocco', '이집트': 'egypt', '노르웨이': 'norway',
  // 음식
  coffee: '커피', chocolate: '초콜릿', dessert: '디저트', sushi: '스시', food: '음식',
  '커피': 'coffee', '초콜릿': 'chocolate', '디저트': 'dessert', '스시': 'sushi', '음식': 'food',
  // 기타
  neon: '네온', cyber: '사이버', space: '우주', galaxy: '갤럭시', ice: '아이스',
  christmas: '크리스마스', halloween: '할로윈', tropical: '열대',
  '네온': 'neon', '사이버': 'cyber', '우주': 'space', '갤럭시': 'galaxy', '아이스': 'ice',
  '크리스마스': 'christmas', '할로윈': 'halloween', '열대': 'tropical',
};

function expandSearchTerms(query) {
  const terms = query.toLowerCase().trim().split(/\s+/);
  const expanded = new Set();
  terms.forEach(t => {
    expanded.add(t);
    if (bilingualMap[t]) expanded.add(bilingualMap[t].toLowerCase());
    // partial match in map keys
    Object.keys(bilingualMap).forEach(k => {
      if (k.includes(t) || t.includes(k)) {
        expanded.add(k);
        expanded.add(bilingualMap[k].toLowerCase());
      }
    });
  });
  return [...expanded];
}

function searchPalette(p, terms) {
  const searchable = [
    p.name, p.desc, p.category || '', p.theme || '', p.sub || '',
    ...(p.tags || [])
  ].join(' ').toLowerCase();
  return terms.some(t => searchable.includes(t));
}

let searchTimeout;
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchInfo = document.getElementById('searchInfo');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(performSearch, 200);
  searchClear.classList.toggle('visible', searchInput.value.length > 0);
});

function clearSearch() {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  searchInfo.textContent = '';
  // restore original views
  document.querySelector('.tabs').style.display = '';
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = '');
  // re-activate previously active tab
  const activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + activeBtn.dataset.tab).classList.add('active');
  }
  document.getElementById('filterBar').style.display = '';
  document.querySelector('#tab-palettes .section-title').textContent = '🎯 추천 색상 팔레트';
  renderPalettes();
  renderThemeGrid();
  renderTrends();
}

function performSearch() {
  const query = searchInput.value.trim();
  if (!query) { clearSearch(); return; }

  const terms = expandSearchTerms(query);

  // Search across all palette types
  const matchedPalettes = palettes.filter(p => searchPalette(p, terms));
  const matchedTheme = themePalettes.filter(p => searchPalette(p, terms));
  const matchedTrend = trendPalettes.filter(p => searchPalette(p, terms));
  const total = matchedPalettes.length + matchedTheme.length + matchedTrend.length;

  // Show all tabs with filtered results
  document.querySelector('.tabs').style.display = 'none';
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');

  // Show palettes tab with combined results
  const palettesTab = document.getElementById('tab-palettes');
  palettesTab.style.display = 'block';

  if (total === 0) {
    document.getElementById('paletteGrid').innerHTML = `
      <div class="search-no-results" style="grid-column:1/-1">
        <div class="no-emoji">🔍</div>
        <p>"${query}" 검색 결과가 없습니다</p>
        <p style="margin-top:8px;font-size:0.85em;">다른 키워드로 검색해보세요 (한글/영어 모두 가능)</p>
      </div>`;
    searchInfo.textContent = '';
    document.getElementById('filterBar').style.display = 'none';
    return;
  }

  searchInfo.textContent = `"${query}" 검색 결과: ${total}개 팔레트`;
  document.getElementById('filterBar').style.display = 'none';
  document.querySelector('#tab-palettes .section-title').textContent = '🔍 검색 결과';

  const allMatched = [
    ...matchedPalettes.map(p => ({...p, source: '추천'})),
    ...matchedTheme.map(p => ({...p, source: '테마'})),
    ...matchedTrend.map(p => ({...p, source: '트렌드', tags: []})),
  ];

  document.getElementById('paletteGrid').innerHTML = allMatched.map(p => `
    <div class="palette-card">
      <div class="palette-colors">
        ${p.colors.map(c => `<div style="background:${c}" data-hex="${c}" onclick="openColorModal('${c}')"></div>`).join('')}
      </div>
      <div class="palette-info">
        <h3>${p.name} <span style="font-size:0.7em;color:var(--accent-light);font-weight:normal;">${p.source}</span></h3>
        <p>${p.desc}</p>
        <div class="palette-tags">
          ${(p.tags || []).map(t => `<span class="palette-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderTrends() {
  trendGrid.innerHTML = trendPalettes.map(p => `
    <div class="trend-card">
      <div class="trend-colors">
        ${p.colors.map(c => `<div style="background:${c}"></div>`).join('')}
      </div>
      <div class="trend-info">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="trend-hex-list">
          ${p.colors.map(c => `<span class="trend-hex" onclick="copyText('${c}')">${c}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

// ===== RANDOM =====
const harmonyMethods = ['complementary','analogous','triadic','split','tetradic','monochromatic'];
const harmonyLabels = { complementary:'보색', analogous:'유사색', triadic:'3색 조화', split:'분할 보색', tetradic:'4색 조화', monochromatic:'단색 조화' };

function generateRandomPalette() {
  const count = Math.floor(Math.random() * 4) + 2; // 2~5
  const baseH = Math.random() * 360;
  const baseS = 40 + Math.random() * 50; // 40~90
  const baseL = 30 + Math.random() * 40; // 30~70
  const baseHex = hslToHex(baseH, baseS, baseL);
  const method = harmonyMethods[Math.floor(Math.random() * harmonyMethods.length)];
  let colors = getHarmonyColors(baseHex, method);
  // shuffle and pick 'count' colors, always include base
  colors = [baseHex, ...colors.sort(() => Math.random() - 0.5)];
  colors = [...new Set(colors)].slice(0, count);
  // if not enough, add slight variations
  while (colors.length < count) {
    const tweak = hslToHex(baseH + (Math.random()*30-15), baseS + (Math.random()*20-10), baseL + (Math.random()*20-10));
    if (!colors.includes(tweak)) colors.push(tweak);
  }
  return { colors, method };
}

function renderRandomPalettes() {
  const palettesArr = Array.from({ length: 12 }, () => generateRandomPalette());
  document.getElementById('randomGrid').innerHTML = palettesArr.map(p => `
    <div class="palette-card">
      <div class="palette-colors">
        ${p.colors.map(c => `<div style="background:${c}" data-hex="${c}" onclick="openColorModal('${c}')"></div>`).join('')}
      </div>
      <div class="palette-info">
        <h3>${p.colors.length}색 ${harmonyLabels[p.method]} 조합</h3>
        <p>${p.colors.map(c => c).join(' · ')}</p>
      </div>
    </div>
  `).join('');
}
renderRandomPalettes();

// ===== COLOR MODAL =====
const allHarmonyTypes = [
  { type: 'complementary', label: '보색', icon: '🔄' },
  { type: 'analogous', label: '유사색', icon: '🌊' },
  { type: 'triadic', label: '3색 조화', icon: '🔺' },
  { type: 'split', label: '분할 보색', icon: '✂️' },
  { type: 'tetradic', label: '4색 조화', icon: '◆' },
  { type: 'monochromatic', label: '단색 조화', icon: '🎚️' },
];

function colorDistance(hex1, hex2) {
  const [h1,s1,l1] = hexToHSL(hex1);
  const [h2,s2,l2] = hexToHSL(hex2);
  const hDiff = Math.min(Math.abs(h1-h2), 360-Math.abs(h1-h2));
  return hDiff * 0.5 + Math.abs(s1-s2) * 0.3 + Math.abs(l1-l2) * 0.2;
}

function findSimilarPalettes(hex, limit = 5) {
  const allPals = [...palettes, ...themePalettes];
  const scored = allPals.map(p => {
    const minDist = Math.min(...p.colors.map(c => colorDistance(hex, c)));
    return { ...p, score: minDist };
  });
  scored.sort((a, b) => a.score - b.score);
  return scored.slice(0, limit);
}

function openColorModal(hex) {
  event.stopPropagation();
  const overlay = document.getElementById('colorModalOverlay');
  document.getElementById('modalColorCircle').style.background = hex;
  document.getElementById('modalColorHex').textContent = hex;

  // Render harmonies
  const harmoniesHTML = allHarmonyTypes.map(h => {
    const colors = getHarmonyColors(hex, h.type);
    return `
      <div class="modal-harmony-group">
        <div class="modal-harmony-label">${h.icon} ${h.label}</div>
        <div class="modal-harmony-swatches">
          ${colors.map(c => `
            <div class="modal-swatch" style="background:${c}" onclick="copyText('${c}')">
              <span class="modal-swatch-hex">${c}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('modalHarmonies').innerHTML = harmoniesHTML;

  // Render similar palettes
  const similar = findSimilarPalettes(hex);
  const similarHTML = `
    <div class="modal-similar-title">📋 비슷한 색상이 포함된 팔레트</div>
    ${similar.map(p => `
      <div class="modal-similar-card">
        <div class="modal-similar-colors">
          ${p.colors.map(c => `<div style="background:${c}" onclick="copyText('${c}')"></div>`).join('')}
        </div>
        <div class="modal-similar-info">
          <strong>${p.name}</strong>
          <span>${p.desc}</span>
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('modalSimilar').innerHTML = similarHTML;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeColorModal() {
  document.getElementById('colorModalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeColorModal();
});
